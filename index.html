<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optima – Gestion artisan plombier</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf9f7;--bg2:#fff;--bg3:#f5f4f1;--text:#1c1917;--text2:#57534e;--text3:#78716c;--border:#e7e5e4;--border2:#d6d3d1;--primary:#b45309;--primary-dark:#92400e;--primary-light:#fef3c7;--danger:#dc2626;--danger-light:#fee2e2;--success:#16a34a;--success-light:#dcfce7;--info:#2563eb;--info-light:#dbeafe;--warning:#d97706;--warning-light:#fef3c7;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.1)}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
a{color:inherit;text-decoration:none}
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap');
.plan-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:#0f1923;position:relative;overflow:hidden}
.plan-screen::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 20% 50%, rgba(180,83,9,0.08) 0%, transparent 50%),radial-gradient(circle at 80% 20%, rgba(180,83,9,0.05) 0%, transparent 40%);pointer-events:none}
.pipe-bg{position:absolute;inset:0;pointer-events:none;opacity:0.04}
.plan-hero{text-align:center;margin-bottom:3rem;position:relative;z-index:1}
.plan-logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:1.5rem}
.plan-logo-icon{width:52px;height:52px;background:#b45309;border-radius:10px;display:flex;align-items:center;justify-content:center}
.plan-logo-name{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;color:#fff;letter-spacing:2px;line-height:1}
.plan-tagline{font-family:'DM Sans',sans-serif;font-size:1rem;color:#94a3b8;margin-bottom:0.5rem}
.plan-sub{display:inline-flex;align-items:center;gap:8px;background:rgba(180,83,9,0.15);border:1px solid rgba(180,83,9,0.3);padding:6px 16px;border-radius:99px;font-size:0.8rem;color:#fb923c;font-family:'DM Sans',sans-serif}
.plan-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.25rem;width:100%;max-width:880px;position:relative;z-index:1}
.plan-card{background:#1a2535;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:1.75rem;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;font-family:'DM Sans',sans-serif}
.plan-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.05);transition:background .25s}
.plan-card:hover{border-color:rgba(180,83,9,0.5);transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,0.3)}
.plan-card:hover::before{background:#b45309}
.plan-card.popular{border-color:rgba(180,83,9,0.4);background:#1e2d3d}
.plan-card.popular::before{background:#b45309}
.plan-badge{display:inline-flex;align-items:center;gap:5px;background:#b45309;color:#fff;font-size:0.7rem;font-weight:600;padding:4px 12px;border-radius:99px;margin-bottom:1rem;font-family:'DM Sans',sans-serif;letter-spacing:0.5px}
.plan-name{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:#fff;letter-spacing:1px;margin-bottom:0.25rem}
.plan-price-wrap{display:flex;align-items:baseline;gap:4px;margin-bottom:0.25rem}
.plan-price{font-size:2.2rem;font-weight:700;color:#fb923c;font-family:'DM Sans',sans-serif}
.plan-price span{font-size:0.9rem;font-weight:400;color:#64748b}
.plan-access{font-size:0.8rem;color:#64748b;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid rgba(255,255,255,0.06);font-family:'DM Sans',sans-serif}
.plan-features{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1.5rem}
.plan-feature{font-size:0.85rem;padding:0;display:flex;align-items:center;gap:8px;color:#94a3b8}
.plan-feature.ok{color:#cbd5e1}
.plan-feature.locked{color:#334155}
.feat-dot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px}
.feat-dot.ok{background:rgba(180,83,9,0.2);color:#fb923c}
.feat-dot.locked{background:rgba(255,255,255,0.04);color:#334155}
.plan-btn{width:100%;padding:0.8rem;background:#b45309;color:#fff;border:none;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;transition:background .15s;font-family:'DM Sans',sans-serif;letter-spacing:0.3px}
.plan-btn:hover{background:#92400e}
.plan-card.popular .plan-btn{background:#ea580c}
.plan-card.popular .plan-btn:hover{background:#c2410c}
.trust-bar{display:flex;align-items:center;justify-content:center;gap:2rem;margin-top:2.5rem;position:relative;z-index:1;flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:8px;color:#475569;font-size:0.8rem;font-family:'DM Sans',sans-serif}
.counter-bar{display:flex;align-items:center;justify-content:center;gap:2rem;margin-top:1.5rem;flex-wrap:wrap}
.counter-item{text-align:center}
.counter-num{display:block;font-family:'Bebas Neue',sans-serif;font-size:2rem;color:#fb923c;letter-spacing:1px;line-height:1}
.counter-label{font-size:0.75rem;color:#475569;font-family:'DM Sans',sans-serif}
.counter-sep{width:1px;height:40px;background:rgba(255,255,255,0.08)}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:#fff;letter-spacing:2px;text-align:center;margin-bottom:2rem;position:relative;z-index:1}
.how-section{width:100%;max-width:880px;margin-bottom:4rem;position:relative;z-index:1}
.steps-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem}
.step-card{background:#1a2535;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:1.25rem;position:relative}
.step-num{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:rgba(251,146,60,0.1);position:absolute;top:0.5rem;right:1rem;line-height:1}
.step-icon{margin-bottom:0.75rem}
.step-card h3{font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:600;color:#e2e8f0;margin-bottom:0.5rem}
.step-card p{font-family:'DM Sans',sans-serif;font-size:0.82rem;color:#64748b;line-height:1.6}
.faq-section{width:100%;max-width:880px;margin-top:3rem;position:relative;z-index:1}
.faq-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem}
.faq-item{background:#1a2535;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:1.25rem}
.faq-item h4{font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:600;color:#e2e8f0;margin-bottom:0.5rem}
.faq-item p{font-family:'DM Sans',sans-serif;font-size:0.82rem;color:#64748b;line-height:1.6}
.app-shell{display:flex;min-height:100vh}
.sidebar{width:220px;background:#1c1917;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sidebar-brand{padding:1.25rem 1.25rem 1rem;border-bottom:1px solid #292524}
.sidebar-brand h1{color:#fef3c7;font-size:1.1rem;font-weight:700;font-family:Georgia,serif}
.sidebar-brand p{color:#a8a29e;font-size:0.72rem;margin-top:2px}
.plan-pill{margin:0.5rem 1.25rem;background:#292524;border-radius:99px;padding:3px 10px;font-size:0.7rem;color:#fcd34d;font-weight:600;text-align:center}
.nav-links{display:flex;flex-direction:column;padding:0.75rem 0;flex:1}
.nav-link{display:block;padding:0.55rem 1.25rem;color:#d6d3d1;font-size:0.875rem;transition:background .15s,color .15s;cursor:pointer}
.nav-link:hover{background:#292524;color:#fff}
.nav-link.active{background:#b45309;color:#fff}
.nav-link.locked-nav{opacity:0.45;cursor:default}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0.875rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10}
.topbar h2{font-size:1.125rem;font-weight:600;flex:1}
.topbar-actions{display:flex;gap:0.5rem;flex-wrap:wrap}
.content{padding:1.5rem;flex:1}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.card h3{font-size:1rem;font-weight:600;margin-bottom:1rem;font-family:Georgia,serif}
.grid-ca{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.75rem;margin-bottom:1rem}
.card-ca{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;box-shadow:var(--shadow)}
.card-ca .label{font-size:0.78rem;color:var(--text3);margin-bottom:0.35rem}
.card-ca .value{font-size:1.15rem;font-weight:700;color:var(--text)}
.btn{display:inline-flex;align-items:center;gap:0.35rem;padding:0.45rem 0.9rem;border-radius:6px;border:1px solid transparent;font-size:0.875rem;font-weight:500;cursor:pointer;transition:background .15s,opacity .15s;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover:not(:disabled){background:var(--primary-dark)}
.btn-secondary{background:var(--bg2);color:var(--text);border-color:var(--border2)}
.btn-secondary:hover:not(:disabled){background:var(--bg3)}
.btn-danger{background:var(--danger-light);color:var(--danger);border-color:#fca5a5}
.btn-danger:hover:not(:disabled){background:#fecaca}
.btn-success{background:var(--success-light);color:var(--success);border-color:#86efac}
.btn-success:hover:not(:disabled){background:#bbf7d0}
.btn-ghost{background:transparent;color:var(--text2);border-color:transparent}
.btn-ghost:hover{background:var(--bg3)}
.btn-sm{padding:0.3rem 0.6rem;font-size:0.8rem}
.form-grid{display:flex;flex-direction:column;gap:0.875rem}
.form-row{display:flex;flex-direction:column;gap:0.35rem}
.form-row label{font-size:0.82rem;font-weight:500;color:var(--text2)}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:0.5rem 0.7rem;border:1px solid var(--border2);border-radius:6px;font-size:0.9rem;background:var(--bg2);color:var(--text);transition:border-color .15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--primary)}
.form-row textarea{min-height:80px;resize:vertical}
.form-row.two{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
.form-row.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:0.875rem}
thead tr{border-bottom:2px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--bg3)}
th{padding:0.6rem 0.75rem;text-align:left;font-weight:600;font-size:0.8rem;color:var(--text2);white-space:nowrap}
td{padding:0.6rem 0.75rem;vertical-align:middle}
.badge{display:inline-block;padding:0.2rem 0.55rem;border-radius:99px;font-size:0.75rem;font-weight:600}
.badge-brouillon{background:#f5f4f1;color:#57534e}
.badge-envoye{background:var(--info-light);color:var(--info)}
.badge-accepte{background:var(--success-light);color:var(--success)}
.badge-refuse{background:var(--danger-light);color:var(--danger)}
.badge-payee{background:var(--success-light);color:var(--success)}
.badge-impayee{background:var(--warning-light);color:var(--warning)}
.badge-retard{background:var(--danger-light);color:var(--danger)}
.lines-editor{overflow-x:auto;margin-bottom:0.75rem}
.lines-editor table{font-size:0.82rem}
.lines-editor th{white-space:nowrap}
.lines-editor td input,.lines-editor td select{padding:0.35rem 0.45rem;font-size:0.82rem;border:1px solid var(--border2);border-radius:4px;background:var(--bg2);color:var(--text)}
.lines-editor td input[type=number]{width:80px}
.lines-editor td input.ln-lib{width:180px}
.lines-editor td select.ln-prod{width:140px}
.totals-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:0.875rem 1rem;max-width:320px;margin-left:auto;display:flex;flex-direction:column;gap:0.35rem;font-size:0.875rem}
.totals-box div{display:flex;justify-content:space-between;gap:1rem}
.totals-box .total-ttc{font-weight:700;font-size:1rem;border-top:1px solid var(--border2);padding-top:0.35rem;margin-top:0.2rem}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:var(--bg2);border-radius:10px;padding:1.5rem;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal h3{font-size:1.05rem;font-weight:700;margin-bottom:1.25rem;font-family:Georgia,serif}
.modal-actions{display:flex;justify-content:flex-end;gap:0.5rem;margin-top:1.25rem}
.stock-low{color:var(--danger);font-weight:600}
.alert{padding:0.75rem 1rem;border-radius:6px;font-size:0.875rem;margin-bottom:0.75rem;display:flex;align-items:flex-start;gap:0.5rem}
.alert-warning{background:var(--warning-light);color:#92400e;border:1px solid #fcd34d}
.alert-danger{background:var(--danger-light);color:#991b1b;border:1px solid #fca5a5}
.alert-success{background:var(--success-light);color:#166534;border:1px solid #86efac}
.alert-info{background:var(--info-light);color:#1e40af;border:1px solid #93c5fd}
.print-doc{display:none}
.empty-state{color:var(--text3);font-style:italic;padding:1.5rem 0;text-align:center}
.overdue-row td{background:#fff5f5}
@media print{.no-print,.sidebar,.topbar,.topbar-actions,.nav-links{display:none!important}.app-shell{display:block}.main{display:block}.content{padding:0}.print-doc{display:block}.card,.main,.content,.app-shell{border:none!important;box-shadow:none!important;background:white!important}body{background:white}}

/* Signature */
.sign-btn{background:#16a34a;color:#fff;border:none;border-radius:6px;padding:0.45rem 0.9rem;font-size:0.875rem;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:0.35rem}
.sign-btn:hover{background:#15803d}
.sign-page{min-height:100vh;background:#faf9f7;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;font-family:system-ui,sans-serif}
.sign-card{background:#fff;border:1px solid #e7e5e4;border-radius:12px;padding:2rem;width:100%;max-width:620px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.sign-card h1{font-size:1.3rem;font-weight:700;font-family:Georgia,serif;margin-bottom:0.25rem;color:#1c1917}
.sign-card .sign-sub{font-size:0.875rem;color:#78716c;margin-bottom:1.5rem}
.sign-devis-recap{background:#f5f4f1;border-radius:8px;padding:1rem;margin-bottom:1.5rem;font-size:0.875rem}
.sign-devis-recap table{width:100%;border-collapse:collapse}
.sign-devis-recap td{padding:4px 0;color:#57534e}
.sign-devis-recap td:last-child{text-align:right;font-weight:600;color:#1c1917}
.sign-input{width:100%;padding:0.6rem 0.8rem;border:2px solid #e7e5e4;border-radius:6px;font-size:1rem;margin-bottom:1rem;transition:border-color .15s}
.sign-input:focus{outline:none;border-color:#b45309}
.sign-check{display:flex;align-items:flex-start;gap:0.5rem;margin-bottom:1.5rem;font-size:0.875rem;color:#57534e;cursor:pointer}
.sign-check input{margin-top:2px;flex-shrink:0;width:16px;height:16px;cursor:pointer}
.sign-confirm-btn{width:100%;padding:0.8rem;background:#b45309;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .15s}
.sign-confirm-btn:hover{background:#92400e}
.sign-confirm-btn:disabled{opacity:0.5;cursor:not-allowed}
.sign-success{text-align:center;padding:2rem}
.sign-success .sign-check-icon{width:64px;height:64px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:2rem}
.sign-success h2{font-size:1.3rem;font-weight:700;color:#16a34a;margin-bottom:0.5rem;font-family:Georgia,serif}
.sign-success p{color:#57534e;font-size:0.9rem}
.sign-expired{text-align:center;padding:2rem;color:#dc2626}

</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
"use strict";
const STORAGE_KEY="optima_v1";
let _dirty=false;
const PLANS={
  starter:{name:"Starter",features:["devis","stock","factures","dashboard","pdf"]},
  pro:{name:"Pro",features:["devis","stock","factures","dashboard","pdf","export_csv","rapport"]},
  business:{name:"Business",features:["devis","stock","factures","dashboard","pdf","export_csv","rapport","multi_users"]},
};
const defaultState=()=>({
  plan:null,clients:[],products:[],
  operationTypes:[{id:uid(),label:"Dépannage"},{id:uid(),label:"Installation"},{id:uid(),label:"Entretien / contrôle"},{id:uid(),label:"Rénovation salle de bains"},{id:uid(),label:"Urgence / fuite"}],
  quotes:[],invoices:[],
  counters:{quote:1,invoice:1,quoteYear:new Date().getFullYear(),invoiceYear:new Date().getFullYear()},
  company:{nom:"Mon entreprise",adresse:"",tel:"",email:"",siret:"",tvaIntracom:"",mentionLegale:""},
});
let state=loadState();
function uid(){return"id_"+Math.random().toString(36).slice(2,11)+Date.now().toString(36)}
function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return defaultState();return migrate(JSON.parse(raw))}catch(e){return defaultState()}}
function migrate(data){
  const d=defaultState();
  if(!data||typeof data!=="object")return d;
  const counters=data.counters&&typeof data.counters==="object"?{quote:data.counters.quote||1,invoice:data.counters.invoice||1,quoteYear:data.counters.quoteYear||new Date().getFullYear(),invoiceYear:data.counters.invoiceYear||new Date().getFullYear()}:d.counters;
  const company=data.company&&typeof data.company==="object"?Object.assign(d.company,data.company):d.company;
  return{plan:data.plan||null,clients:Array.isArray(data.clients)?data.clients:d.clients,products:Array.isArray(data.products)?data.products:d.products,operationTypes:Array.isArray(data.operationTypes)&&data.operationTypes.length?data.operationTypes:d.operationTypes,quotes:Array.isArray(data.quotes)?data.quotes:d.quotes,invoices:Array.isArray(data.invoices)?data.invoices.map(inv=>{if(!inv.echeance&&inv.date){const d=new Date(inv.date);d.setDate(d.getDate()+30);inv.echeance=d.toISOString().slice(0,10)}return inv}):d.invoices,counters,company};
}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));_dirty=false}
function hasFeat(feat){if(!state.plan)return false;return(PLANS[state.plan]||PLANS.starter).features.includes(feat)}
function formatEUR(n){return new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR"}).format(Number(n)||0)}
function formatDate(iso){if(!iso)return"—";const d=new Date(iso);return isNaN(d.getTime())?"—":d.toLocaleDateString("fr-FR")}
function isoToday(){return new Date().toISOString().slice(0,10)}
function isOverdue(inv){if(!inv||inv.payee||!inv.echeance)return false;return new Date(inv.echeance)<new Date()}
function startOfDay(d){const x=new Date(d);x.setHours(0,0,0,0);return x}
function endOfDay(d){const x=new Date(d);x.setHours(23,59,59,999);return x}
function startOfWeek(d){const x=startOfDay(d);const day=x.getDay();x.setDate(x.getDate()+(day===0?-6:1-day));return x}
function endOfWeek(d){const s=startOfWeek(d);const e=new Date(s);e.setDate(e.getDate()+6);return endOfDay(e)}
function startOfMonth(d){return startOfDay(new Date(d.getFullYear(),d.getMonth(),1))}
function endOfMonth(d){return endOfDay(new Date(d.getFullYear(),d.getMonth()+1,0))}
function startOfYear(d){return startOfDay(new Date(d.getFullYear(),0,1))}
function endOfYear(d){return endOfDay(new Date(d.getFullYear(),11,31))}
function caInRange(start,end,onlyPaid){let sum=0;state.invoices.forEach(inv=>{const t=new Date(inv.date);if(t<start||t>end)return;if(onlyPaid&&!inv.payee)return;sum+=Number(inv.totalTTC)||0});return sum}
function clientById(id){return state.clients.find(c=>c.id===id)}
function productById(id){return state.products.find(p=>p.id===id)}
function opTypeById(id){return state.operationTypes.find(o=>o.id===id)}
function computeLineTotals(l){const qty=Number(l.qty)||0,pu=Number(l.prixUnitHT)||0,tva=Number(l.tvaPct)||0;const ht=qty*pu,tvaAmt=ht*(tva/100);return{ht,tva:tvaAmt,ttc:ht+tvaAmt}}
function computeDocTotals(lignes){let ht=0,tva=0;(lignes||[]).forEach(l=>{const t=computeLineTotals(l);ht+=t.ht;tva+=t.tva});return{totalHT:ht,totalTVA:tva,totalTTC:ht+tva}}
function nextQuoteNumber(){const y=new Date().getFullYear();if(y!==state.counters.quoteYear){state.counters.quote=1;state.counters.quoteYear=y}const n=state.counters.quote++;saveState();return"D-"+y+"-"+String(n).padStart(3,"0")}

function renderSignPage(route){
  const quoteId = route.id;
  const quote = state.quotes.find(q => q.id === quoteId);
  const el = document.createElement('div');

  if(!quote){

  if(quote.statut === 'accepte'){

    return el;
  }

  const client = clientById(quote.clientId);
  const t = opTypeById(quote.typeOpId);
  const co = state.company;

  el.innerHTML = `<div class="sign-page">
    <div class="sign-card">
      <h1>Signature du devis ${escapeHtml(quote.numero)}</h1>
      <p class="sign-sub">Proposé par ${escapeHtml(co.nom)} · ${escapeHtml(formatDate(quote.date))}</p>
      <div class="sign-devis-recap">
        <table>
          <tr><td>Client</td><td>${escapeHtml(client ? client.nom : '—')}</td></tr>
          <tr><td>Type</td><td>${escapeHtml(t ? t.label : '—')}</td></tr>
          <tr><td>Total HT</td><td>${formatEUR(quote.totalHT)}</td></tr>
          <tr><td>TVA</td><td>${formatEUR(quote.totalTVA)}</td></tr>
          <tr><td style="font-weight:700;color:#1c1917">Total TTC</td><td style="font-size:1.1rem">${formatEUR(quote.totalTTC)}</td></tr>
        </table>
        ${quote.notes ? `<p style="margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid #e7e5e4;font-size:0.82rem;color:#78716c">${escapeHtml(quote.notes)}</p>` : ''}
      </div>
      <div id="sign-form">
        <label style="font-size:0.82rem;font-weight:500;color:#57534e;display:block;margin-bottom:0.35rem">Votre nom complet *</label>
        <input type="text" class="sign-input" id="sign-name" placeholder="Ex. Jean Dupont">
        <label class="sign-check">
          <input type="checkbox" id="sign-agree">
          J'ai lu et j'accepte le devis ${escapeHtml(quote.numero)} pour un montant de ${formatEUR(quote.totalTTC)} TTC. Cette validation vaut acceptation du devis.
        </label>
        <button class="sign-confirm-btn" id="sign-submit" disabled>✍ Signer et accepter le devis</button>
      </div>
      <p style="margin-top:1rem;font-size:0.75rem;color:#a8a29e;text-align:center">Signature électronique sécurisée · ${new Date().toLocaleDateString('fr-FR')}</p>
    </div>
  </div>`;

  const nameInput = el.querySelector('#sign-name');
  const agreeCheck = el.querySelector('#sign-agree');
  const submitBtn = el.querySelector('#sign-submit');

  function checkForm(){
    submitBtn.disabled = !(nameInput.value.trim().length > 2 && agreeCheck.checked);
  }

  nameInput.addEventListener('input', checkForm);
  agreeCheck.addEventListener('change', checkForm);

  submitBtn.addEventListener('click', () => {
    const signerName = nameInput.value.trim();
    const qi = state.quotes.findIndex(q => q.id === quoteId);
    if(qi >= 0){
      state.quotes[qi].statut = 'accepte';

      <p style="margin-top:0.5rem">Nous vous contacterons très prochainement.</p>
    </div>`;
  });

  return el;
}

function exportCSV(){
  const rows=[["Numéro","Date","Échéance","Client","HT","TVA","TTC","Payée","Type"]];
  state.invoices.slice().sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(inv=>{const c=clientById(inv.clientId);const t=opTypeById(inv.typeOpId);rows.push([inv.numero,inv.date,inv.echeance||"",c?c.nom:"",(Number(inv.totalHT)||0).toFixed(2),(Number(inv.totalTVA)||0).toFixed(2),(Number(inv.totalTTC)||0).toFixed(2),inv.payee?"Oui":"Non",t?t.label:""])});
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(";")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="optima-comptabilite-"+new Date().toISOString().slice(0,7)+".csv";a.click();URL.revokeObjectURL(a.href);
}

  }
  el.querySelector("#q-search").addEventListener("input",refresh);el.querySelector("#q-filter").addEventListener("change",refresh);refresh();return el;
}
function convertQuoteToInvoice(quoteId){
  const q=state.quotes.find(x=>x.id===quoteId);if(!q)return;if(!confirm("Convertir ce devis en facture ?"))return;
  const echeance=new Date();echeance.setDate(echeance.getDate()+30);
  const inv={id:uid(),numero:nextInvoiceNumber(),clientId:q.clientId,typeOpId:q.typeOpId,date:isoToday(),echeance:echeance.toISOString().slice(0,10),payee:false,deductStock:true,lignes:q.lignes.map(l=>Object.assign({},l)),totalHT:q.totalHT,totalTVA:q.totalTVA,totalTTC:q.totalTTC,notes:q.notes||"",fromQuote:q.numero};
  applyStockDelta(null,inv,inv.deductStock);state.invoices.push(inv);
  const qi=state.quotes.findIndex(x=>x.id===quoteId);if(qi>=0)state.quotes[qi].statut="accepte";
  saveState();alert(`Facture ${inv.numero} créée.`);nav("edit-facture/"+inv.id);
}
function statutBadge(s){const map={brouillon:"badge badge-brouillon",envoye:"badge badge-envoye",accepte:"badge badge-accepte",refuse:"badge badge-refuse"};const labels={brouillon:"Brouillon",envoye:"Envoyé",accepte:"Accepté",refuse:"Refusé"};return`<span class="${map[s]||map.brouillon}">${escapeHtml(labels[s]||s)}</span>`}
function renderQuoteEditor(route){
  const id=route.id;const existing=id?state.quotes.find(q=>q.id===id):null;
  const doc=existing||{id:uid(),numero:"",clientId:"",typeOpId:state.operationTypes[0]?state.operationTypes[0].id:"",date:isoToday(),statut:"brouillon",lignes:[{libelle:"",qty:1,prixUnitHT:0,tvaPct:20,productId:null}],totalHT:0,totalTVA:0,totalTTC:0,notes:""};
  const el=document.createElement("div");
  el.innerHTML='<div class="no-print" style="margin-bottom:1rem;display:flex;gap:0.5rem;flex-wrap:wrap"><button type="button" class="btn btn-secondary" id="back">← Retour</button><button type="button" class="btn btn-primary" id="print">🖨 Imprimer / PDF</button><button type="button" class="btn btn-success" id="sign-link">✍ Lien de signature</button></div><div class="card"><form id="qf"><div class="form-row two"><div class="form-row"><label>Client *</label><select name="clientId" required>'+clientOptions(doc.clientId)+'</select></div><div class="form-row"><label>Type d\'intervention</label><select name="typeOpId">'+typeOptions(doc.typeOpId)+'</select></div></div><div class="form-row two"><div class="form-row"><label>Date</label><input name="date" type="date" value="'+escapeHtml(doc.date)+'"></div><div class="form-row"><label>Statut</label><select name="statut"><option value="brouillon"'+(doc.statut==="brouillon"?" selected":"")+'>Brouillon</option><option value="envoye"'+(doc.statut==="envoye"?" selected":"")+'>Envoyé</option><option value="accepte"'+(doc.statut==="accepte"?" selected":"")+'>Accepté</option><option value="refuse"'+(doc.statut==="refuse"?" selected":"")+'>Refusé</option></select></div></div><h4 style="font-family:Georgia,serif;margin:1.25rem 0 0.5rem">Lignes</h4><div class="lines-editor"><table><thead><tr><th>Produit stock</th><th>Libellé</th><th>Qté</th><th>PU HT</th><th>TVA %</th><th class="no-print"></th></tr></thead><tbody id="lbody"></tbody></table></div><button type="button" class="btn btn-secondary no-print" id="addl">+ Ligne</button><div class="totals-box" id="totals" style="margin-top:1rem"></div><div class="form-row" style="margin-top:1rem"><label>Notes / conditions</label><textarea name="notes">'+escapeHtml(doc.notes||"")+'</textarea></div><div class="modal-actions no-print" style="margin-top:1.5rem"><button type="submit" class="btn btn-primary">Enregistrer le devis</button></div></form></div>';
  const tbody=el.querySelector("#lbody");const products=state.products;
  (doc.lignes||[]).forEach((l,i)=>{const wrap=document.createElement("tbody");wrap.innerHTML=ligneRowHtml(l,i,products);tbody.appendChild(wrap.firstElementChild)});
  function updateTotals(){const lignes=readLignesFromTable(tbody);const t=computeDocTotals(lignes);el.querySelector("#totals").innerHTML=`<div><span>Total HT</span><span>${formatEUR(t.totalHT)}</span></div><div><span>TVA</span><span>${formatEUR(t.totalTVA)}</span></div><div class="total-ttc"><span>Total TTC</span><span>${formatEUR(t.totalTTC)}</span></div>`}
  bindAllLineRows(tbody,updateTotals);updateTotals();
  el.querySelector("#addl").addEventListener("click",()=>addEmptyLine(tbody,products,updateTotals));
  el.querySelector("#back").addEventListener("click",()=>nav("devis"));
  el.querySelector("#print").addEventListener("click",()=>{const b=buildQuoteFromForm();if(!b.numero)b.numero="BROUILLON";printDoc("devis",doc.id,b)});
  el.querySelector("#qf").querySelectorAll("input,select,textarea").forEach(inp=>{if(!inp.closest(".lines-editor"))inp.addEventListener("change",markDirty)});
  el.querySelector("#qf").addEventListener("submit",e=>{e.preventDefault();const saved=buildQuoteFromForm();if(!saved.clientId){alert("Choisissez un client.");return}if(!existing&&!saved.numero)saved.numero=nextQuoteNumber();const idx=state.quotes.findIndex(x=>x.id===saved.id);if(idx>=0)state.quotes[idx]=saved;else state.quotes.push(saved);saveState();_dirty=false;alert("Devis enregistré.");nav("devis")});
  function buildQuoteFromForm(){const fd=new FormData(el.querySelector("#qf"));const lignes=readLignesFromTable(tbody);const t=computeDocTotals(lignes);return{id:doc.id,numero:doc.numero,clientId:fd.get("clientId"),typeOpId:fd.get("typeOpId"),date:fd.get("date"),statut:fd.get("statut"),lignes,totalHT:t.totalHT,totalTVA:t.totalTVA,totalTTC:t.totalTTC,notes:(fd.get("notes")||"").trim()}}
  return el;
}
function renderInvoices(){
  const el=document.createElement("div");
  el.innerHTML='<div class="no-print" style="margin-bottom:1rem;display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center"><button type="button" class="btn btn-primary" id="nf">+ Nouvelle facture</button><input type="search" id="inv-search" placeholder="Rechercher…" style="padding:0.45rem 0.75rem;border:1px solid var(--border2);border-radius:6px;font-size:0.875rem;min-width:200px"><select id="inv-filter"><option value="">Tous</option><option value="impayee">Impayées</option><option value="payee">Payées</option><option value="retard">En retard</option></select></div><div class="card"><div id="it"></div></div>';
  el.querySelector("#nf").addEventListener("click",()=>nav("nouvelle-facture"));
  function refresh(){
    const q=(el.querySelector("#inv-search").value||"").toLowerCase();const filt=el.querySelector("#inv-filter").value;const root=el.querySelector("#it");
    let invoices=state.invoices.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
    if(filt==="payee")invoices=invoices.filter(i=>i.payee);else if(filt==="impayee")invoices=invoices.filter(i=>!i.payee);else if(filt==="retard")invoices=invoices.filter(i=>isOverdue(i));
    if(q)invoices=invoices.filter(i=>{const c=clientById(i.clientId);return[i.numero,c&&c.nom,i.totalTTC].some(f=>(f+"").toLowerCase().includes(q))});
    if(!invoices.length){root.innerHTML=`<p class="empty-state">${q||filt?"Aucun résultat.":"Aucune facture."}</p>`;return}
    root.innerHTML='<div class="table-wrap"><table><thead><tr><th>N°</th><th>Date</th><th>Échéance</th><th>Client</th><th>TTC</th><th>Paiement</th><th></th></tr></thead><tbody>'+invoices.map(inv=>{const c=clientById(inv.clientId);const overdue=isOverdue(inv);const payBadge=inv.payee?'<span class="badge badge-payee">Payée</span>':(overdue?'<span class="badge badge-retard">En retard</span>':'<span class="badge badge-impayee">Impayée</span>');return`<tr${overdue&&!inv.payee?' class="overdue-row"':''}><td>${escapeHtml(inv.numero)}</td><td>${formatDate(inv.date)}</td><td>${formatDate(inv.echeance)}</td><td>${escapeHtml(c?c.nom:"—")}</td><td>${formatEUR(inv.totalTTC)}</td><td>${payBadge}</td><td class="no-print" style="white-space:nowrap"><button class="btn btn-secondary btn-sm ie" data-id="${inv.id}">Ouvrir</button><button class="btn btn-ghost btn-sm ip" data-id="${inv.id}">PDF</button><button class="btn btn-danger btn-sm idel" data-id="${inv.id}">Sup.</button></td></tr>`}).join("")+'</tbody></table></div>';
    root.querySelectorAll(".ie").forEach(b=>b.addEventListener("click",()=>nav("edit-facture/"+b.getAttribute("data-id"))));
    root.querySelectorAll(".ip").forEach(b=>b.addEventListener("click",()=>printDoc("facture",b.getAttribute("data-id"))));
    root.querySelectorAll(".idel").forEach(b=>b.addEventListener("click",()=>{if(!confirm("Supprimer cette facture ?"))return;const id=b.getAttribute("data-id");const inv=state.invoices.find(x=>x.id===id);if(inv)revertInvoiceStock(inv);state.invoices=state.invoices.filter(x=>x.id!==id);saveState();refresh()}));
  }
  el.querySelector("#inv-search").addEventListener("input",refresh);el.querySelector("#inv-filter").addEventListener("change",refresh);refresh();return el;
}
function renderInvoiceEditor(route){
  const id=route.id;const existing=id?state.invoices.find(x=>x.id===id):null;
  const defaultEcheance=new Date();defaultEcheance.setDate(defaultEcheance.getDate()+30);
  const doc=existing||{id:uid(),numero:"",clientId:"",typeOpId:state.operationTypes[0]?state.operationTypes[0].id:"",date:isoToday(),echeance:defaultEcheance.toISOString().slice(0,10),payee:false,deductStock:true,lignes:[{libelle:"",qty:1,prixUnitHT:0,tvaPct:20,productId:null}],totalHT:0,totalTVA:0,totalTTC:0,notes:""};
  const el=document.createElement("div");
  el.innerHTML='<div class="no-print" style="margin-bottom:1rem;display:flex;gap:0.5rem;flex-wrap:wrap"><button type="button" class="btn btn-secondary" id="back">← Retour</button><button type="button" class="btn btn-primary" id="print">🖨 Imprimer / PDF</button></div><div class="card"><form id="iff"><div class="form-row two"><div class="form-row"><label>Client *</label><select name="clientId" required>'+clientOptions(doc.clientId)+'</select></div><div class="form-row"><label>Type d\'intervention</label><select name="typeOpId">'+typeOptions(doc.typeOpId)+'</select></div></div><div class="form-row three"><div class="form-row"><label>Date</label><input name="date" type="date" value="'+escapeHtml(doc.date)+'"></div><div class="form-row"><label>Échéance paiement</label><input name="echeance" type="date" value="'+escapeHtml(doc.echeance||"")+'"></div><div class="form-row" style="justify-content:flex-end"><label style="display:flex;align-items:center;gap:0.4rem;margin-top:1.5rem"><input type="checkbox" name="payee"'+(doc.payee?" checked":"")+'style="width:auto">Facture payée</label></div></div><div class="form-row"><label><input type="checkbox" name="deductStock"'+(doc.deductStock!==false?" checked":"")+'style="width:auto;margin-right:0.35rem">Déduire les quantités du stock</label></div><h4 style="font-family:Georgia,serif;margin:1.25rem 0 0.5rem">Lignes</h4><div class="lines-editor"><table><thead><tr><th>Produit stock</th><th>Libellé</th><th>Qté</th><th>PU HT</th><th>TVA %</th><th class="no-print"></th></tr></thead><tbody id="ibody"></tbody></table></div><button type="button" class="btn btn-secondary no-print" id="addli">+ Ligne</button><div class="totals-box" id="itot" style="margin-top:1rem"></div><div class="form-row" style="margin-top:1rem"><label>Notes / conditions</label><textarea name="notes">'+escapeHtml(doc.notes||"")+'</textarea></div><div class="modal-actions no-print" style="margin-top:1.5rem"><button type="submit" class="btn btn-primary">Enregistrer la facture</button></div></form></div>';
  const tbody=el.querySelector("#ibody");const products=state.products;
  (doc.lignes||[]).forEach(l=>{const wrap=document.createElement("tbody");wrap.innerHTML=ligneRowHtml(l,0,products);tbody.appendChild(wrap.firstElementChild)});
  function updateTotals(){const lignes=readLignesFromTable(tbody);const t=computeDocTotals(lignes);el.querySelector("#itot").innerHTML=`<div><span>Total HT</span><span>${formatEUR(t.totalHT)}</span></div><div><span>TVA</span><span>${formatEUR(t.totalTVA)}</span></div><div class="total-ttc"><span>Total TTC</span><span>${formatEUR(t.totalTTC)}</span></div>`}
  bindAllLineRows(tbody,updateTotals);updateTotals();
  el.querySelector("#addli").addEventListener("click",()=>addEmptyLine(tbody,products,updateTotals));
  el.querySelector("#back").addEventListener("click",()=>nav("factures"));
  el.querySelector("#print").addEventListener("click",()=>{const b=buildInvFromForm();if(!b.numero)b.numero="BROUILLON";printDoc("facture",doc.id,b)});
  el.querySelector("#iff").querySelectorAll("input,select,textarea").forEach(inp=>{if(!inp.closest(".lines-editor"))inp.addEventListener("change",markDirty)});
  el.querySelector("#iff").addEventListener("submit",e=>{
    e.preventDefault();const prev=existing?JSON.parse(JSON.stringify(existing)):null;const saved=buildInvFromForm();
    if(!saved.clientId){alert("Choisissez un client.");return}if(!existing&&!saved.numero)saved.numero=nextInvoiceNumber();
    if(saved.deductStock){const warnings=[];saved.lignes.forEach(l=>{if(!l.productId)return;const p=productById(l.productId);if(!p)return;const prevQty=prev&&prev.lignes?prev.lignes.filter(x=>x.productId===l.productId).reduce((s,x)=>s+(Number(x.qty)||0),0):0;const delta=(Number(l.qty)||0)-prevQty;const futureStock=(Number(p.stock)||0)-delta;if(futureStock<0)warnings.push(`"${p.nom}" passerait à ${futureStock}`)});if(warnings.length&&!confirm("Stock insuffisant :\n"+warnings.join("\n")+"\n\nEnregistrer quand même ?"))return}
    applyStockDelta(prev,saved,saved.deductStock);const idx=state.invoices.findIndex(x=>x.id===saved.id);if(idx>=0)state.invoices[idx]=saved;else state.invoices.push(saved);saveState();_dirty=false;alert("Facture enregistrée.");nav("factures");
  });
  function buildInvFromForm(){const fd=new FormData(el.querySelector("#iff"));const lignes=readLignesFromTable(tbody);const t=computeDocTotals(lignes);return{id:doc.id,numero:doc.numero,clientId:fd.get("clientId"),typeOpId:fd.get("typeOpId"),date:fd.get("date"),echeance:fd.get("echeance"),payee:!!fd.get("payee"),deductStock:!!fd.get("deductStock"),lignes,totalHT:t.totalHT,totalTVA:t.totalTVA,totalTTC:t.totalTTC,notes:(fd.get("notes")||"").trim()}}
  return el;
}
function revertInvoiceStock(inv){if(!inv||!inv.deductStock)return;(inv.lignes||[]).forEach(l=>{if(!l.productId)return;const p=productById(l.productId);if(p)p.stock=(Number(p.stock)||0)+(Number(l.qty)||0)})}
function applyStockDelta(prev,next,deduct){revertInvoiceStock(prev);if(!next||!deduct)return;(next.lignes||[]).forEach(l=>{if(!l.productId)return;const p=productById(l.productId);if(p)p.stock=(Number(p.stock)||0)-(Number(l.qty)||0)})}
function clientOptions(selectedId){let html='<option value="">— Choisir —</option>';state.clients.slice().sort((a,b)=>(a.nom||"").localeCompare(b.nom||"","fr")).forEach(c=>{html+=`<option value="${c.id}"${c.id===selectedId?" selected":""}>${escapeHtml(c.nom)}</option>`});return html}
function typeOptions(selectedId){return state.operationTypes.map(o=>`<option value="${o.id}"${o.id===selectedId?" selected":""}>${escapeHtml(o.label)}</option>`).join("")}
function printDoc(kind,id,draft){
  let doc=draft;if(!doc){if(kind==="devis")doc=state.quotes.find(q=>q.id===id);else doc=state.invoices.find(x=>x.id===id)}if(!doc)return;
  const c=clientById(doc.clientId),t=opTypeById(doc.typeOpId),co=state.company;const title=kind==="devis"?"DEVIS":"FACTURE";
  const lines=(doc.lignes||[]).map(l=>`<tr><td>${escapeHtml(l.libelle)}</td><td style="text-align:right">${escapeHtml(String(l.qty))}</td><td style="text-align:right">${formatEUR(l.prixUnitHT)}</td><td style="text-align:right">${escapeHtml(String(l.tvaPct))}%</td><td style="text-align:right">${formatEUR(computeLineTotals(l).ttc)}</td></tr>`).join("")||"<tr><td colspan='5'>—</td></tr>";
  const host=document.createElement("div");host.className="print-doc";host.style.cssText="padding:2rem;font-family:Georgia,serif;max-width:800px;margin:0 auto";
  host.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2rem"><div><h1 style="font-size:1.8rem;color:#b45309;margin:0">${title}</h1><p style="margin:0.25rem 0 0;font-size:1.1rem;font-weight:bold">N° ${escapeHtml(doc.numero)}</p></div><div style="text-align:right;font-size:0.875rem"><strong>${escapeHtml(co.nom)}</strong><br>${nl2br(co.adresse)}<br>${co.tel?"Tél. "+escapeHtml(co.tel)+"<br>":""}${co.email?escapeHtml(co.email)+"<br>":""}${co.siret?"SIRET : "+escapeHtml(co.siret)+"<br>":""}${co.tvaIntracom?"TVA : "+escapeHtml(co.tvaIntracom):""}</div></div><div style="display:flex;justify-content:space-between;margin:0 0 1.5rem;gap:2rem"><div style="font-size:0.875rem"><strong>Client</strong><br>${c?escapeHtml(c.nom)+"<br>"+nl2br(c.adresse)+"<br>"+escapeHtml((c.cp||"")+" "+(c.ville||""))+"<br>"+(c.tel?"Tél. "+escapeHtml(c.tel):""):"—"}</div><div style="font-size:0.875rem;text-align:right"><strong>Date :</strong> ${formatDate(doc.date)}<br>${kind==="facture"&&doc.echeance?`<strong>Échéance :</strong> ${formatDate(doc.echeance)}<br>`:""}${doc.fromQuote?`<strong>Devis :</strong> ${escapeHtml(doc.fromQuote)}<br>`:""}<strong>Type :</strong> ${escapeHtml(t?t.label:"—")}<br>${kind==="facture"?`<strong>Paiement :</strong> ${doc.payee?"Payée ✓":"En attente"}`:`<strong>Statut :</strong> ${escapeHtml(doc.statut||"")}`}</div></div><table style="width:100%;border-collapse:collapse;font-size:10pt;margin-bottom:1rem"><thead><tr style="border-bottom:2px solid #333"><th style="text-align:left;padding:8px 6px">Désignation</th><th style="text-align:right;padding:8px 6px">Qté</th><th style="text-align:right;padding:8px 6px">PU HT</th><th style="text-align:right;padding:8px 6px">TVA</th><th style="text-align:right;padding:8px 6px">Montant TTC</th></tr></thead><tbody>${lines}</tbody></table><div style="text-align:right;max-width:260px;margin-left:auto;font-size:10pt"><div style="display:flex;justify-content:space-between;padding:3px 0">Total HT <span>${formatEUR(doc.totalHT)}</span></div><div style="display:flex;justify-content:space-between;padding:3px 0">TVA <span>${formatEUR(doc.totalTVA)}</span></div><div style="display:flex;justify-content:space-between;padding:6px 0;font-weight:bold;font-size:12pt;border-top:2px solid #333;margin-top:4px">Total TTC <span>${formatEUR(doc.totalTTC)}</span></div></div>${doc.notes?`<div style="margin-top:1.5rem;padding:0.75rem 1rem;border:1px solid #e7e5e4;border-radius:6px;font-size:9pt;font-family:system-ui,sans-serif;color:#57534e"><strong>Notes :</strong><br>${nl2br(doc.notes)}</div>`:""}${co.mentionLegale?`<p style="margin-top:2rem;font-size:8pt;color:#78716c;font-family:system-ui,sans-serif;text-align:center;border-top:1px solid #e7e5e4;padding-top:0.5rem">${escapeHtml(co.mentionLegale)}</p>`:""}`;
  document.body.appendChild(host);window.print();document.body.removeChild(host);
}
function nl2br(s){return escapeHtml(s||"").replace(/\n/g,"<br>")}
window.addEventListener("beforeunload",e=>{if(_dirty){e.preventDefault();e.returnValue=""}});
window.addEventListener("hashchange",render);
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",render)}else{render()}
})();
</script>
</body>
