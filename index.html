.review-card{background:#1a2535;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:1.25rem}
.review-stars{color:#f59e0b;font-size:14px;margin-bottom:0.5rem}
.review-text{font-family:'DM Sans',sans-serif;font-size:0.875rem;color:#94a3b8;line-height:1.6;margin-bottom:0.75rem;font-style:italic}
.review-author{display:flex;align-items:center;gap:10px}
.review-avatar{width:36px;height:36px;border-radius:50%;background:#b45309;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;color:#fff;flex-shrink:0}
.review-name{font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;color:#e2e8f0}

/* Calculateur ROI */
.roi-section{width:100%;max-width:880px;margin-top:3rem;position:relative;z-index:1;background:#1a2535;border:1px solid rgba(234,88,12,0.2);border-radius:16px;padding:2rem}
.roi-section h2{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:#fff;letter-spacing:2px;text-align:center;margin-bottom:0.5rem}
.roi-section p{font-family:'DM Sans',sans-serif;font-size:0.9rem;color:#94a3b8;text-align:center;margin-bottom:1.5rem}
.roi-sliders{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}
.roi-slider-wrap{display:flex;flex-direction:column;gap:0.5rem}
.roi-slider-label{font-family:'DM Sans',sans-serif;font-size:0.82rem;color:#94a3b8;display:flex;justify-content:space-between}
.roi-slider-label span{color:#fb923c;font-weight:600}
.roi-result{background:#0f1923;border-radius:12px;padding:1.25rem;text-align:center}
.roi-result-num{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:#ea580c;letter-spacing:2px;line-height:1}
.roi-result-label{font-family:'DM Sans',sans-serif;font-size:0.875rem;color:#94a3b8;margin-top:0.25rem}
.roi-result-sub{font-family:'DM Sans',sans-serif;font-size:0.8rem;color:#475569;margin-top:0.5rem}
/* Compteur places */
.places-banner{background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.3);border-radius:8px;padding:0.75rem 1.25rem;text-align:center;margin-bottom:1rem;font-family:'DM Sans',sans-serif;font-size:0.875rem;color:#fca5a5;position:relative;z-index:1}
.places-banner strong{color:#f87171}
/* Bouton SMS */
.sms-float{position:fixed;bottom:1.5rem;right:1.5rem;z-index:50;background:#16a34a;color:#fff;border:none;border-radius:99px;padding:12px 20px;font-size:0.875rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,0.3);font-family:'DM Sans',sans-serif}

/* Garantie */
.garantie-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(22,163,74,0.1);border:1px solid rgba(22,163,74,0.3);padding:8px 16px;border-radius:99px;font-size:0.8rem;color:#86efac;font-family:'DM Sans',sans-serif;margin-top:1rem}
/* GIF demo */
.demo-gif-section{width:100%;max-width:880px;margin-top:3rem;position:relative;z-index:1;text-align:center}
.demo-gif-wrap{background:#1a2535;border:1px solid rgba(255,255,255,0.06);border-radius:16px;overflow:hidden;padding:1.5rem}
.demo-screen{background:#0f1923;border-radius:8px;padding:1rem;text-align:left;font-family:'DM Sans',sans-serif;font-size:0.82rem;color:#94a3b8;min-height:180px;position:relative;overflow:hidden}
.demo-line{padding:4px 0;display:flex;align-items:center;gap:8px;opacity:0;animation:fadeInLine 0.4s forwards}
.demo-line.active{color:#e2e8f0}
.demo-cursor{display:inline-block;width:2px;height:14px;background:#ea580c;animation:blink 1s infinite}
@keyframes fadeInLine{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@media(max-width:600px){.roi-sliders{grid-template-columns:1fr}}

<body>
<div id="app"></div>
<script>
(function(){
"use strict";
const STORAGE_KEY="optima_v1";
let _dirty=false;
const PLANS={
  starter:{name:"Starter",features:["devis","stock","factures","dashboard","pdf"]},
  pro:{name:"Pro",features:["devis","stock","factures","dashboard","pdf","export_csv","rapport"]},
  business:{name:"Business",features:["devis","stock","factures","dashboard","pdf","export_csv","rapport","multi_users"]},
};
const defaultState=()=>({
  plan:null,clients:[],products:[],
  operationTypes:[{id:uid(),label:"Dépannage"},{id:uid(),label:"Installation"},{id:uid(),label:"Entretien / contrôle"},{id:uid(),label:"Rénovation salle de bains"},{id:uid(),label:"Urgence / fuite"}],
  quotes:[],invoices:[],
  counters:{quote:1,invoice:1,quoteYear:new Date().getFullYear(),invoiceYear:new Date().getFullYear()},
  company:{nom:"Mon entreprise",adresse:"",tel:"",email:"",siret:"",tvaIntracom:"",mentionLegale:""},
});
let state=loadState();
function uid(){return"id_"+Math.random().toString(36).slice(2,11)+Date.now().toString(36)}
function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return defaultState();return migrate(JSON.parse(raw))}catch(e){return defaultState()}}
function migrate(data){
  const d=defaultState();
  if(!data||typeof data!=="object")return d;
  const counters=data.counters&&typeof data.counters==="object"?{quote:data.counters.quote||1,invoice:data.counters.invoice||1,quoteYear:data.counters.quoteYear||new Date().getFullYear(),invoiceYear:data.counters.invoiceYear||new Date().getFullYear()}:d.counters;
  const company=data.company&&typeof data.company==="object"?Object.assign(d.company,data.company):d.company;
  return{plan:data.plan||null,clients:Array.isArray(data.clients)?data.clients:d.clients,products:Array.isArray(data.products)?data.products:d.products,operationTypes:Array.isArray(data.operationTypes)&&data.operationTypes.length?data.operationTypes:d.operationTypes,quotes:Array.isArray(data.quotes)?data.quotes:d.quotes,invoices:Array.isArray(data.invoices)?data.invoices.map(inv=>{if(!inv.echeance&&inv.date){const d=new Date(inv.date);d.setDate(d.getDate()+30);inv.echeance=d.toISOString().slice(0,10)}return inv}):d.invoices,counters,company};
}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));_dirty=false}
function hasFeat(feat){if(!state.plan)return false;return(PLANS[state.plan]||PLANS.starter).features.includes(feat)}
function formatEUR(n){return new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR"}).format(Number(n)||0)}
function formatDate(iso){if(!iso)return"—";const d=new Date(iso);return isNaN(d.getTime())?"—":d.toLocaleDateString("fr-FR")}
function isoToday(){return new Date().toISOString().slice(0,10)}
function isOverdue(inv){if(!inv||inv.payee||!inv.echeance)return false;return new Date(inv.echeance)<new Date()}
function startOfDay(d){const x=new Date(d);x.setHours(0,0,0,0);return x}
function endOfDay(d){const x=new Date(d);x.setHours(23,59,59,999);return x}
function startOfWeek(d){const x=startOfDay(d);const day=x.getDay();x.setDate(x.getDate()+(day===0?-6:1-day));return x}
function endOfWeek(d){const s=startOfWeek(d);const e=new Date(s);e.setDate(e.getDate()+6);return endOfDay(e)}
function startOfMonth(d){return startOfDay(new Date(d.getFullYear(),d.getMonth(),1))}
function endOfMonth(d){return endOfDay(new Date(d.getFullYear(),d.getMonth()+1,0))}
function startOfYear(d){return startOfDay(new Date(d.getFullYear(),0,1))}
function endOfYear(d){return endOfDay(new Date(d.getFullYear(),11,31))}
function caInRange(start,end,onlyPaid){let sum=0;state.invoices.forEach(inv=>{const t=new Date(inv.date);if(t<start||t>end)return;if(onlyPaid&&!inv.payee)return;sum+=Number(inv.totalTTC)||0});return sum}
function clientById(id){return state.clients.find(c=>c.id===id)}
function productById(id){return state.products.find(p=>p.id===id)}
function opTypeById(id){return state.operationTypes.find(o=>o.id===id)}
function computeLineTotals(l){const qty=Number(l.qty)||0,pu=Number(l.prixUnitHT)||0,tva=Number(l.tvaPct)||0;const ht=qty*pu,tvaAmt=ht*(tva/100);return{ht,tva:tvaAmt,ttc:ht+tvaAmt}}
function computeDocTotals(lignes){let ht=0,tva=0;(lignes||[]).forEach(l=>{const t=computeLineTotals(l);ht+=t.ht;tva+=t.tva});return{totalHT:ht,totalTVA:tva,totalTTC:ht+tva}}
function nextQuoteNumber(){const y=new Date().getFullYear();if(y!==state.counters.quoteYear){state.counters.quote=1;state.counters.quoteYear=y}const n=state.counters.quote++;saveState();return"D-"+y+"-"+String(n).padStart(3,"0")}
function nextInvoiceNumber(){const y=new Date().getFullYear();if(y!==state.counters.invoiceYear){state.counters.invoice=1;state.counters.invoiceYear=y}const n=state.counters.invoice++;saveState();return"F-"+y+"-"+String(n).padStart(3,"0")}
function clientHasDocs(clientId){return state.quotes.some(q=>q.clientId===clientId)||state.invoices.some(i=>i.clientId===clientId)}
function getRoute(){const h=(location.hash||"#/").replace(/^#\/?/,"")||"dashboard";const parts=h.split("/");return{view:parts[0],id:parts[1]||null}}
function nav(to){if(_dirty&&!confirm("Modifications non enregistrées. Quitter ?"))return;_dirty=false;location.hash="#/"+to}
const app=document.getElementById("app");
/* ——— Signature électronique ——— */
function generateSignLink(quoteId){
  const base = window.location.href.split('#')[0];
  return base + '#/sign/' + quoteId;
}
function renderSignPage(route){
  const quoteId = route.id;
  const quote = state.quotes.find(q => q.id === quoteId);
  const el = document.createElement('div');
  if(!quote){
    el.innerHTML = `<div class="sign-page"><div class="sign-card"><div class="sign-expired"><h2>Devis introuvable</h2><p>Ce lien de signature est invalide ou a expiré.</p></div></div></div>`;
    return el;
  }
  if(quote.statut === 'accepte'){
    el.innerHTML = `<div class="sign-page"><div class="sign-card"><div class="sign-success"><div class="sign-check-icon">✓</div><h2>Devis déjà signé</h2><p>Ce devis a déjà été accepté. Merci !</p></div></div></div>`;
    return el;
  }
  const client = clientById(quote.clientId);
  const t = opTypeById(quote.typeOpId);
  const co = state.company;
  el.innerHTML = `<div class="sign-page">
    <div class="sign-card">
      <h1>Signature du devis ${escapeHtml(quote.numero)}</h1>
      <p class="sign-sub">Proposé par ${escapeHtml(co.nom)} · ${escapeHtml(formatDate(quote.date))}</p>
      <div class="sign-devis-recap">
        <table>
          <tr><td>Client</td><td>${escapeHtml(client ? client.nom : '—')}</td></tr>
          <tr><td>Type</td><td>${escapeHtml(t ? t.label : '—')}</td></tr>
          <tr><td>Total HT</td><td>${formatEUR(quote.totalHT)}</td></tr>
          <tr><td>TVA</td><td>${formatEUR(quote.totalTVA)}</td></tr>
          <tr><td style="font-weight:700;color:#1c1917">Total TTC</td><td style="font-size:1.1rem">${formatEUR(quote.totalTTC)}</td></tr>
        </table>
        ${quote.notes ? `<p style="margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid #e7e5e4;font-size:0.82rem;color:#78716c">${escapeHtml(quote.notes)}</p>` : ''}
      </div>
      <div id="sign-form">
        <label style="font-size:0.82rem;font-weight:500;color:#57534e;display:block;margin-bottom:0.35rem">Votre nom complet *</label>
        <input type="text" class="sign-input" id="sign-name" placeholder="Ex. Jean Dupont">
        <label class="sign-check">
          <input type="checkbox" id="sign-agree">
          J'ai lu et j'accepte le devis ${escapeHtml(quote.numero)} pour un montant de ${formatEUR(quote.totalTTC)} TTC. Cette validation vaut acceptation du devis.
        </label>
        <button class="sign-confirm-btn" id="sign-submit" disabled>✍ Signer et accepter le devis</button>
      </div>
      <p style="margin-top:1rem;font-size:0.75rem;color:#a8a29e;text-align:center">Signature électronique sécurisée · ${new Date().toLocaleDateString('fr-FR')}</p>
    </div>
  </div>`;
  const nameInput = el.querySelector('#sign-name');
  const agreeCheck = el.querySelector('#sign-agree');
  const submitBtn = el.querySelector('#sign-submit');
  function checkForm(){
    submitBtn.disabled = !(nameInput.value.trim().length > 2 && agreeCheck.checked);
  }
  nameInput.addEventListener('input', checkForm);
  agreeCheck.addEventListener('change', checkForm);
  submitBtn.addEventListener('click', () => {
    const signerName = nameInput.value.trim();
    const qi = state.quotes.findIndex(q => q.id === quoteId);
    if(qi >= 0){
      state.quotes[qi].statut = 'accepte';
      state.quotes[qi].signedBy = signerName;
      state.quotes[qi].signedAt = new Date().toISOString();
      saveState();
    }
    // Notifier N8N via webhook
    fetch('https://n8n.srv1455484.hstgr.cloud/webhook/signature-optima', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        devis: quote.numero,
        montant: quote.totalTTC,
        client: client ? client.nom : 'Inconnu',
        client_tel: client ? client.tel : '',
        signe_par: signerName,
        signe_le: new Date().toLocaleDateString('fr-FR'),
        entreprise: state.company.nom,
        entreprise_tel: state.company.tel,
      })
    }).catch(()=>{});
    el.querySelector('#sign-form').innerHTML = `<div class="sign-success">
      <div class="sign-check-icon">✓</div>
      <h2>Devis accepté !</h2>
      <p>Merci <strong>${escapeHtml(signerName)}</strong>, votre acceptation du devis ${escapeHtml(quote.numero)} a bien été enregistrée.</p>
      <p style="margin-top:0.5rem">Nous vous contacterons très prochainement.</p>
    </div>`;
  });
  return el;
}
// Bouton SMS flottant
function addSMSButton(){
  if(document.getElementById('sms-float-btn')) return;
  var btn = document.createElement('button');
  btn.id = 'sms-float-btn';
  btn.className = 'sms-float';
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Nous contacter';
  btn.addEventListener('click', function(){
    window.location.href = 'sms:+33767377115?body=Bonjour, je suis intéressé par Optima pour plombiers.';
  });
  document.body.appendChild(btn);
}
// Calculateur ROI
function calcROI(){
  var nb = parseInt((document.getElementById('nb-devis')||{value:5}).value)||5;
  var temps = parseInt((document.getElementById('temps-devis')||{value:30}).value)||30;
  var tx = parseInt((document.getElementById('taux-horaire')||{value:50}).value)||50;
  var perd = parseInt((document.getElementById('devis-perdus')||{value:2}).value)||2;
  var v1=document.getElementById('nb-devis-val');if(v1)v1.textContent=nb;
  var v2=document.getElementById('temps-devis-val');if(v2)v2.textContent=temps;
  var v3=document.getElementById('taux-val');if(v3)v3.textContent=tx;
  var v4=document.getElementById('perdu-val');if(v4)v4.textContent=perd;
  var gainTemps=(temps-2)*nb*4/60;
  var gainArgent=Math.round(gainTemps*tx);
  var gainPerdus=perd*300;
  var total=gainArgent+gainPerdus;
  var gain=document.getElementById('roi-gain');if(gain)gain.textContent=total+'€';
  var det=document.getElementById('roi-detail');if(det)det.textContent=gainTemps.toFixed(1)+'h récupérées + '+perd+' devis non oubliés · vs 29€/mois';
}
function initROI(){
  var ids=['nb-devis','temps-devis','taux-horaire','devis-perdus'];
  ids.forEach(function(id){var el=document.getElementById(id);if(el)el.addEventListener('input',calcROI)});
  calcROI();
}
// GIF démo animé
function initDemoGif(){
  var screen = document.getElementById('demo-screen');
  if(!screen) return;
  var steps = [
    {text: '👤 Client : Jean Dupont — 12 rue des Lilas, Metz', delay: 500},
    {text: '🔧 Prestation : Débouchage canalisation', delay: 1500},
    {text: '💰 Prix unitaire : 150€ HT — TVA 10%', delay: 2500},
    {text: '📄 Génération du devis D-2026-001...', delay: 3500, special: true},
    {text: '✅ PDF créé — Envoi par email au client', delay: 4500},
    {text: '📱 Notification : Client a signé le devis !', delay: 6000, success: true},
  ];
  steps.forEach(function(step){
    setTimeout(function(){
      var line = document.createElement('div');
      line.className = 'demo-line' + (step.special ? ' active' : '') + (step.success ? ' active' : '');
      line.style.color = step.success ? '#86efac' : step.special ? '#fb923c' : '';
      line.style.animationDelay = '0s';
      line.innerHTML = step.text;
      screen.appendChild(line);
      // Restart après la fin
      if(step === steps[steps.length-1]){
        setTimeout(function(){
          screen.innerHTML = '<div style="color:#475569;font-size:0.75rem;margin-bottom:0.75rem">▶ Optima — Nouveau devis</div>';

}
